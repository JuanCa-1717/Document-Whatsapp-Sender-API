openapi: 3.0.3
info:
  title: WhatsApp Document Sender API
  version: "1.0.1"
  description: Public REST API to send WhatsApp text messages and documents. This spec does not require API key authentication.
servers:
  - url: https://document-whatsapp-sender-api.onrender.com/
    description: Production server
paths:
  /connect/{clientId}:
    post:
      summary: Connect client and generate QR
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Connection state and QR data if needed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectResponse'
    get:
      summary: Get connection status
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current session status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectResponse'
  /qr/{clientId}:
    get:
      summary: Get QR image as PNG
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PNG QR image
          content:
            image/png:
              schema:
                type: string
                format: binary
        '404':
          description: QR not available
          content:
            text/html:
              schema:
                type: string
  /send/{clientId}:
    post:
      summary: Send text message or document
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendRequest'
            examples:
              textMessage:
                value:
                  telefono: "506XXXXXXXX"
                  caption: "Hello from the API"
              documentMessage:
                value:
                  telefono: "506XXXXXXXX"
                  url_documento: "https://example.com/document.pdf"
                  caption: "Your document"
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendResponse'
        '400':
          description: Invalid input or disconnected client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /status/{clientId}:
    get:
      summary: Get simple status
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
components:
  schemas:
    SendRequest:
      type: object
      properties:
        telefono:
          type: string
          description: Target phone number with country code (no plus sign, no spaces).
          example: "506XXXXXXXX"
        url_documento:
          type: string
          format: uri
          description: Public URL of the file to send (optional).
          example: "https://example.com/document.pdf"
        caption:
          type: string
          description: Optional text message or document caption.
          example: "Optional caption"
      required:
        - telefono
    SendResponse:
      type: object
      properties:
        estado:
          type: string
          example: enviado
        mensaje:
          type: string
          example: Documento enviado correctamente
        id_mensaje:
          type: string
          example: ABC123
        destinatario:
          type: string
          example: "506XXXXXXXX"
    ConnectResponse:
      type: object
      properties:
        status:
          type: string
          example: needs-scan
        qr:
          type: string
          nullable: true
          description: Base64 PNG data URL or null.
        qr_url:
          type: string
          nullable: true
          description: Public URL to open the QR in a browser.
        message:
          type: string
          example: Scan the QR code
    StatusResponse:
      type: object
      properties:
        clientId:
          type: string
          example: my-client
        status:
          type: string
          example: connected
        connected:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      properties:
        estado:
          type: string
          example: fallido
        mensaje:
          type: string
          example: Cliente no conectado